name: Build DrugBank APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Prepare Gradle and Build
        run: |
          # 1. Buscar la carpeta que contiene el proyecto de Android
          PROJECT_DIR=$(find . -name "build.gradle*" -printf '%h' -quit)
          
          if [ -z "$PROJECT_DIR" ]; then
            echo "Error: No se encontró un archivo build.gradle. Asegúrate de subir tu proyecto."
            exit 1
          fi
          
          echo "Proyecto encontrado en: $PROJECT_DIR"
          cd "$PROJECT_DIR"

          # 2. Generar el wrapper (el archivo gradlew que falta)
          gradle wrapper --gradle-version 8.4
          
          # 3. Darle permisos de ejecución
          chmod +x gradlew
          
          # 4. Compilar el APK
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrugBankExplorer-debug
          # Buscamos el APK generado sin importar la ruta exacta
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 30
