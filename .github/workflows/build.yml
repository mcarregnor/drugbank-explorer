name: Build DrugBank APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Detect Project Root and Generate Wrapper
        run: |
          # Buscamos dónde está el archivo settings.gradle
          PROJECT_ROOT=$(find . -name "settings.gradle*" -printf '%h' -quit)
          
          if [ -z "$PROJECT_ROOT" ]; then
            echo "ERROR: No se encontró ningún archivo settings.gradle en el repositorio."
            echo "Asegúrate de haber subido los archivos de tu proyecto Android."
            ls -R
            exit 1
          fi
          
          echo "Proyecto encontrado en: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # Generamos el wrapper si no existe
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew
          
          # Guardamos la ruta para los siguientes pasos
          echo "project_path=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: Build Release APK
        run: |
          cd ${{ env.project_path }}
          ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: ${{ env.project_path }}/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: DrugBankExplorer-Release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 30
