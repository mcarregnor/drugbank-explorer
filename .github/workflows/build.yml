name: Build DrugBank APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Force Gradle Install and Build
        run: |
          # 1. Encontrar la carpeta donde está build.gradle
          PROJECT_ROOT=$(find . -name "build.gradle*" -printf '%h' -quit)
          
          if [ -z "$PROJECT_ROOT" ]; then
            echo "ERROR: No se encontró build.gradle. ¿Subiste los archivos del proyecto?"
            ls -R
            exit 1
          fi
          
          echo "Proyecto detectado en: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"

          # 2. Instalar Gradle en el corredor de GitHub (porque no está el wrapper)
          sudo apt-get update && sudo apt-get install -y gradle
          
          # 3. Generar un nuevo wrapper localmente en el servidor
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          
          # 4. Compilar
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DrugBankExplorer-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 30
