name: Build DrugBank APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Aceptamos licencias explícitamente y definimos paquetes
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Accept Android Licenses
        run: |
          # Forzamos la aceptación de todas las licencias mediante un pipe de "yes"
          yes | sdkmanager --licenses || true

      - name: Generate Gradle wrapper
        run: |
          # Solo genera el wrapper si no existe en el repo
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrugBankExplorer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
